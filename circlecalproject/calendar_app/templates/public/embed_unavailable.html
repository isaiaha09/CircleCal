{% extends "calendar_app/base.html" %}

{% block title %}Booking widget unavailable{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-10 px-4">
  <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
    <h1 class="text-xl font-bold text-gray-900 mb-2">Booking widget unavailable</h1>
    <p class="text-gray-700">
      {% if embed_unavailable_message %}
        {{ embed_unavailable_message }}
      {% else %}
        This booking widget isn’t available right now.
      {% endif %}
    </p>
  </div>
</div>
{% endblock %}
