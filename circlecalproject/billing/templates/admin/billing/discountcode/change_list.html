{% extends "admin/change_list.html" %}
{% load i18n admin_urls %}

{% block object-tools-items %}
  {% if has_add_permission %}
    <li>
      <a href="{% url cl.opts|admin_urlname:'add' %}" class="addlink">{% blocktranslate with cl.opts.verbose_name as name %}Add {{ name }}{% endblocktranslate %}</a>
    </li>
  {% endif %}
  {{ block.super }}
{% endblock %}
